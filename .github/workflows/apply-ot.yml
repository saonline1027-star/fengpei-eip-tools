name: 申請加班

on:
  workflow_dispatch:
    inputs:
      username:
        description: '員工編號'
        required: true
      password:
        description: '密碼'
        required: true
      nueip_sn:
        description: 'NuEIP SN（不確定可空白）'
        required: false
        default: ''
      ot_date:
        description: '加班日期（2026-06-15）'
        required: true
      ot_start:
        description: '開始時間（17:30）'
        required: true
      ot_end:
        description: '結束時間（20:00）'
        required: true
      ot_type:
        description: '類型：1=平日換加班費 2=平日換補休 3=假日換加班費 4=假日換補休'
        required: true
        default: '1'
      ot_reason:
        description: '說明（可空白）'
        required: false
        default: ''
      delay_minutes:
        description: '延遲幾分鐘後執行（0 = 立即）'
        required: false
        default: '0'

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 130
    steps:
      - uses: actions/checkout@v4

      - name: Mask password
        run: echo "::add-mask::${{ inputs.password }}"

      - name: 延遲等待
        if: ${{ inputs.delay_minutes != '0' }}
        run: |
          echo "⏳ 等待 ${{ inputs.delay_minutes }} 分鐘後執行..."
          sleep $(( ${{ inputs.delay_minutes }} * 60 ))

      - name: Install dependencies
        run: npm install --omit=dev

      - name: 執行申請加班
        env:
          EIP_COMPANY: retech
          EIP_USERNAME: ${{ inputs.username }}
          EIP_PASSWORD: ${{ inputs.password }}
          EIP_NUEIP_SN: ${{ inputs.nueip_sn }}
          OT_DATE: ${{ inputs.ot_date }}
          OT_START: ${{ inputs.ot_start }}
          OT_END: ${{ inputs.ot_end }}
          OT_TYPE: ${{ inputs.ot_type }}
          OT_REASON: ${{ inputs.ot_reason }}
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
          GSHEET_WEBHOOK_URL: ${{ secrets.GSHEET_WEBHOOK_URL }}
          GSHEET_SECRET: ${{ secrets.GSHEET_SECRET }}
        run: node scripts/apply-ot.js
