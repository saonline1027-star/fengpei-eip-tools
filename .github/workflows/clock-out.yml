name: 打卡下班

on:
  workflow_dispatch:
    inputs:
      username:
        description: '員工編號'
        required: true
      password:
        description: '密碼'
        required: true
      destination:
        description: '目的地'
        required: false
        default: '辦公室'
      remark:
        description: '說明'
        required: false
        default: ''
      scheduled_time:
        description: '預定打卡時間（台北時間 HH:MM，空白=立即執行）'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4

      - name: Mask password
        run: echo "::add-mask::${{ inputs.password }}"

      - name: 等待預定時間
        if: ${{ inputs.scheduled_time != '' }}
        env:
          TARGET_TIME: ${{ inputs.scheduled_time }}
        run: |
          TARGET=$(TZ=Asia/Taipei date -d "today $TARGET_TIME" +%s)
          NOW=$(date +%s)
          DELAY=$((TARGET - NOW))
          if [ $DELAY -gt 0 ]; then
            echo "預定台北時間 $TARGET_TIME，等待 ${DELAY} 秒..."
            sleep $DELAY
          else
            echo "預定時間已過，立即執行"
          fi

      - name: Install dependencies
        run: npm install --omit=dev

      - name: 執行打卡下班
        env:
          EIP_COMPANY: retech
          EIP_USERNAME: ${{ inputs.username }}
          EIP_PASSWORD: ${{ inputs.password }}
          EIP_DESTINATION: ${{ inputs.destination }}
          EIP_REMARK: ${{ inputs.remark }}
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
        run: node scripts/clock-out.js
