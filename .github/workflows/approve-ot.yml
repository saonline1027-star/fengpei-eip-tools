name: 加班簽核

on:
  workflow_dispatch:
    inputs:
      username:
        description: '員工編號'
        required: true
      password:
        description: '密碼'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Mask password
        run: echo "::add-mask::${{ inputs.password }}"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: 執行加班簽核
        env:
          EIP_COMPANY: retech
          EIP_USERNAME: ${{ inputs.username }}
          EIP_PASSWORD: ${{ inputs.password }}
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
        run: node scripts/approve-ot.js
